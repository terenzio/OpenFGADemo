name: Agent Authorization Demo Tests
model_file: ./authorization-model-ai-agent.fga

tuples:
  # Folder/file hierarchy
  - user: folder:root
    relation: parent
    object: folder:projects
  - user: folder:projects
    relation: parent
    object: file:report
  - user: folder:root
    relation: parent
    object: file:secret

  # Human ownership: alice owns root (cascades down)
  - user: user:alice
    relation: owner
    object: folder:root

  # Agent → user delegation pointers (informational)
  - user: user:alice
    relation: principal
    object: agent:scribe
  - user: user:alice
    relation: principal
    object: agent:reader

  # agent:scribe is an editor on folder:projects (read + write + delete in that subtree)
  - user: agent:scribe
    relation: editor
    object: folder:projects

  # agent:reader is a viewer on folder:root (read-only, everywhere under root)
  - user: agent:reader
    relation: viewer
    object: folder:root

tests:
  - name: Alice (owner of root) can view, edit, delete file:report via cascade — but not share (share requires a direct owner tuple)
    check:
      - user: user:alice
        object: file:report
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
          can_share: false

  - name: agent:scribe is editor on folder:projects → can view, edit and delete file:report; cannot share
    check:
      - user: agent:scribe
        object: file:report
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
          can_share: false

  - name: agent:scribe has no role on folder:root → denied by default on file:secret
    check:
      - user: agent:scribe
        object: file:secret
        assertions:
          can_view: false
          can_edit: false
          can_delete: false
          can_share: false

  - name: agent:reader is a viewer on folder:root → can read everything but never edit or delete
    check:
      - user: agent:reader
        object: file:report
        assertions:
          can_view: true
          can_edit: false
          can_delete: false
          can_share: false
      - user: agent:reader
        object: file:secret
        assertions:
          can_view: true
          can_edit: false
          can_delete: false
          can_share: false

  - name: list_objects reflects each agent's role (scribe edits only its subtree; reader edits nothing)
    list_objects:
      - user: agent:scribe
        type: file
        assertions:
          can_edit:
            - file:report
          can_view:
            - file:report
      - user: agent:reader
        type: file
        assertions:
          can_edit: []
          can_view:
            - file:report
            - file:secret
