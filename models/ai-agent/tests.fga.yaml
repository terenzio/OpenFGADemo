name: Agent Authorization Demo Tests
model_file: ./authorization-model.fga

tuples:
  # Folder/file hierarchy
  - user: folder:root
    relation: parent
    object: folder:projects
  - user: folder:projects
    relation: parent
    object: file:report
  - user: folder:root
    relation: parent
    object: file:secret

  # Human ownership: alice owns root (cascades down)
  - user: user:alice
    relation: owner
    object: folder:root

  # Agent → user delegation pointers (informational)
  - user: user:alice
    relation: principal
    object: agent:scribe
  - user: user:alice
    relation: principal
    object: agent:janitor

  # Agents granted editor role
  - user: agent:scribe
    relation: editor
    object: folder:projects
  - user: agent:janitor
    relation: editor
    object: folder:root

  # Global gate: humans always authorized everywhere
  - user: user:*
    relation: edit_authorized
    object: folder:root
  - user: user:*
    relation: delete_authorized
    object: folder:root

  # Bounded agent grants
  - user: agent:scribe
    relation: edit_authorized
    object: folder:projects
  - user: agent:janitor
    relation: edit_authorized
    object: folder:projects
  - user: agent:janitor
    relation: delete_authorized
    object: folder:projects

tests:
  - name: Alice (owner of root) can view, edit, delete file:report via cascade — but not share (share requires direct owner tuple)
    check:
      - user: user:alice
        object: file:report
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
          can_share: false
  - name: agent:scribe is editor + edit_authorized via projects → can_edit, but no delete_authorized → cannot delete
    check:
      - user: agent:scribe
        object: file:report
        assertions:
          can_view: true
          can_edit: true
          can_delete: false
          can_share: false
  - name: agent:scribe has no editor or edit_authorized on root → cannot edit file:secret
    check:
      - user: agent:scribe
        object: file:secret
        assertions:
          can_view: false
          can_edit: false
          can_delete: false
          can_share: false
  - name: agent:janitor delete_authorized is bounded to projects/ subtree
    check:
      - user: agent:janitor
        object: file:report
        assertions:
          can_edit: true
          can_delete: true
      - user: agent:janitor
        object: file:secret
        assertions:
          can_edit: false
          can_delete: false
  - name: list_objects(agent:scribe, file, can_edit) returns only file:report (intersection enforced during enumeration)
    list_objects:
      - user: agent:scribe
        type: file
        assertions:
          can_edit:
            - file:report
          can_delete: []
